# ── Rate limiting ──────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=app:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# ── HTTP → HTTPS redirect (main domain) ───────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name dzmock.uz www.dzmock.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://dzmock.uz$request_uri;
    }
}

# ── HTTPS main application ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dzmock.uz www.dzmock.uz;

    ssl_certificate     /etc/letsencrypt/live/dzmock.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dzmock.uz/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/dzmock.uz/chain.pem;

    ssl_dhparam /etc/nginx/dhparam.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 20M;

    # Static files served directly by Nginx
    location /static/ {
        alias /opt/app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    # Media files (payment screenshots)
    location /media/ {
        alias /opt/app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Rate-limit the login endpoint more aggressively
    location ~* ^(/[a-z]{2}/)?login {
        limit_req zone=login burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Django application
    location / {
        limit_req zone=app burst=40 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }
}

# ── HTTP → HTTPS redirect (logs subdomain) ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name logs.dzmock.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://logs.dzmock.uz$request_uri;
    }
}

# ── HTTPS Dozzle log viewer ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name logs.dzmock.uz;

    ssl_certificate     /etc/letsencrypt/live/logs.dzmock.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logs.dzmock.uz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Nginx Basic Auth protects Dozzle
    auth_basic "Restricted — CDI Logs";
    auth_basic_user_file /etc/nginx/.htpasswd_dozzle;

    location / {
        proxy_pass http://127.0.0.1:9999;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE / WebSocket support for live log streaming
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}
