# ─────────────────────────────────────────────────────────────────────────────
# CDI Mock System — Standalone docker-compose (local dev / solo server)
# For multi-project production (dzmock.uz on shared Nginx server),
# the actual deployment lives at /opt/cdi/docker-compose.yml on the server.
# ─────────────────────────────────────────────────────────────────────────────
services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    image: ghcr.io/asilbeek17/dreamzone-mock:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /opt/cdi/media:/app/media
      - /opt/cdi/staticfiles:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c 'import socket; socket.create_connection((\"localhost\",8000),timeout=5)'"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
