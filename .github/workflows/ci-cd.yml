name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check . --output-format=github

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Tests (Django)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_cdi
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django tests
        env:
          SECRET_KEY: ci-test-secret-key-not-used-in-production
          DEBUG: "True"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
          CSRF_TRUSTED_ORIGINS: "http://localhost"
          DB_NAME: test_cdi
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: "5432"
        run: python manage.py test --verbosity=2

  # ── Security Scan ───────────────────────────────────────────────────────────
  security:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r cdi_app cdi_project -ll --skip B101 || true

  # ── Build & Push Docker image ───────────────────────────────────────────────
  build-push:
    name: Build & Push to GHCR
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ── Deploy to Production ────────────────────────────────────────────────────
  deploy:
    name: Deploy to dzmock.uz
    needs: build-push
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://dzmock.uz

    steps:
      - name: Deploy via SSH
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sudo apt-get install -y -q sshpass
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd /opt/cdi && bash scripts/deploy.sh"

      - name: Verify deployment
        run: |
          sleep 15
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://dzmock.uz/ || echo "000")
          echo "Health check response: HTTP $HTTP_CODE"
          if [[ ! "$HTTP_CODE" =~ ^(200|301|302|303)$ ]]; then
            echo "ERROR: Deployment health check failed (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Deployment verified successfully."
